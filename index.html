<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Primadapp</title>

<!-- PWA: instalable, standalone, dark teal -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1716">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<!-- iOS: web app a pantalla completa -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Primadapp">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     Tokens (ver DESIGN.md). Color · Espaciado y layout · Radios.
     Toda referencia de espaciado/radio/altura-de-toque pasa por aquí;
     nada de valores px sueltos en las reglas.
     ============================================================ */
  :root{
    /* color */
    --paper:#0d1716; --paper-2:#13201f; --paper-3:#1a2c2a; --ink:#e2eeec; --ink-soft:#8aa3a0;
    --line:#25403d; --red:#2DD4BF; --red-deep:#14b8a6; --green:#4DD9A0; --amber:#e0b341;
    --accent:#2DD4BF; --accent-ink:#0d1716; --pos:#4DD9A0; --pos-bg:#103028; --alert:#F08C8C; --alert-bg:#3a1818;
    --shadow:0 1px 0 rgba(0,0,0,.2), 0 14px 32px -18px rgba(0,0,0,.75);
    /* espaciado (DESIGN.md › Espaciado y layout) */
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:20px; --space-5:28px; --space-6:40px; --space-safe:86px;
    /* radios */
    --radius-sm:8px; --radius-md:12px; --radius-lg:20px; --radius-xl:28px;
    /* alturas mínimas de toque (necesarias como variables para no dejar px sueltos) */
    --tap-btn:52px; --tap-sec:40px; --tap-row:56px; --tap-input:52px;
    /* ancho máximo de contenido (solo mobile, sin breakpoints desktop) */
    --content-max:480px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  /* min-height (no height:100%): el body crece con el contenido, así el padding inferior queda
     DEBAJO de todo el scroll y la tabbar fija no tapa el último contenido. */
  body{
    min-height:100%;
    font-family:"Instrument Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 0);
    background-size:14px 14px;line-height:1.4;-webkit-font-smoothing:antialiased;
    padding:0 0 calc(var(--space-safe) + env(safe-area-inset-bottom));
  }
  .wrap{max-width:var(--content-max);margin:0 auto;padding:var(--space-3)}

  /* ---------- Encabezado ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-2) var(--space-1) var(--space-3);border-bottom:2px dashed var(--line);margin-bottom:var(--space-3)}
  .brand h1{font-family:"Instrument Sans",sans-serif;font-weight:800;font-size:34px;line-height:.95;letter-spacing:-.02em;color:var(--ink)}
  .brand h1 .accent{color:var(--accent)}
  /* tagline: subtítulo que cabe EXACTO bajo el wordmark (no lo sobrepasa). Tamaño y tracking
     ajustados para igualar el ancho de "Primadapp" (~174px); mayúsculas con tracking leve. */
  .brand .tagline{margin-top:var(--space-1);font-weight:400;font-size:10px;letter-spacing:.3px;color:var(--ink-soft);white-space:nowrap}
  .header-actions{display:flex;gap:var(--space-2)}
  .gear{display:flex;align-items:center;justify-content:center;background:var(--paper-2);border:2px solid var(--line);border-radius:var(--radius-md);width:44px;height:44px;font-size:20px;cursor:pointer;color:var(--accent)}
  .gear:active{transform:scale(.94)}
  .gear:hover{border-color:var(--accent)}

  /* Iconografía Lucide (SVG inline). .icon hereda el color del botón vía currentColor (teal por
     defecto; --alert en destructivos). Ver DESIGN.md › Iconografía. */
  .icon{width:20px;height:20px;flex:none;vertical-align:middle}
  .icon.sm{width:16px;height:16px}
  .mini .icon,.btn .icon{width:18px;height:18px;margin-right:var(--space-1);margin-top:-2px}
  .mini.danger{color:var(--alert)}
  .xmini .icon{width:16px;height:16px}

  /* ---------- Bloques ---------- */
  .status{font-size:12px;color:var(--ink-soft);background:var(--paper-2);border:2px solid var(--line);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);margin-bottom:var(--space-3)}
  .status b{color:var(--green)}
  .bar{display:flex;gap:var(--space-2);margin-bottom:var(--space-3)}
  .btn{flex:1;min-height:var(--tap-btn);display:flex;align-items:center;justify-content:center;font-family:"Instrument Sans",sans-serif;font-weight:700;border:none;cursor:pointer;border-radius:var(--radius-md);background:var(--red);color:var(--accent-ink);padding:var(--space-3);font-size:15px;transition:transform .08s ease, background .15s}
  .btn:active{transform:scale(.96)}
  .btn:hover{background:var(--red-deep)}
  .btn.ghost{background:var(--paper-2);color:var(--ink);border:2px solid var(--line)}
  .btn.ghost:hover{border-color:var(--red);background:var(--paper-2)}

  .panel{background:var(--paper-2);color:var(--ink);border-radius:var(--radius-lg);padding:var(--space-4);margin-bottom:var(--space-4);box-shadow:var(--shadow)}
  .panel-title{font-family:"Instrument Sans",sans-serif;font-weight:700;font-size:20px;margin-bottom:var(--space-2)}
  .kv{display:flex;justify-content:space-between;align-items:baseline;gap:var(--space-3);padding:var(--space-1) 0;font-size:13px;border-top:1px dashed rgba(255,255,255,.14)}
  .kv:first-of-type{border-top:none}
  .kv span{color:var(--ink-soft)}
  .kv b{font-weight:700}

  .h2{font-family:"Instrument Sans",sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:0 var(--space-1) var(--space-2)}
  .plist{display:flex;flex-direction:column;gap:var(--space-2)}
  .pitem{display:flex;align-items:center;gap:var(--space-3);min-height:var(--tap-row);text-align:left;cursor:pointer;width:100%;background:var(--paper-2);border:2px solid var(--line);border-radius:var(--radius-lg);padding:var(--space-3);font-family:inherit;color:var(--ink)}
  .pitem.active{border-color:var(--red)}
  .pitem-main{flex:1;min-width:0}
  .pitem-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pitem-meta{font-size:11px;color:var(--ink-soft)}
  .pitem-num{text-align:right;font-size:12px;display:flex;flex-direction:column;gap:var(--space-1);white-space:nowrap}
  .pitem-num .muted{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
  .pitem-num b{color:var(--ink);font-weight:700}
  .pitem-num b.g{color:var(--red-deep)}

  .badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);vertical-align:middle}
  .badge.warn{background:rgba(224,179,65,.16);color:var(--amber);border:1px solid rgba(224,179,65,.42)}

  .empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:var(--space-5) var(--space-4);border:2px dashed var(--line);border-radius:var(--radius-lg)}
  .note{margin-top:var(--space-4);font-size:11px;color:var(--ink-soft);text-align:center;line-height:1.5}

  /* ---------- Barra de tabs (placeholder de navegación, se cablea en PASO 2) ---------- */
  .tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:var(--space-1);background:var(--paper-2);padding:var(--space-2) var(--space-2) calc(var(--space-2) + env(safe-area-inset-bottom));box-shadow:0 -10px 30px -20px rgba(0,0,0,.6);z-index:40}
  .tab{flex:1;max-width:160px;min-height:var(--tap-sec);background:transparent;border:none;cursor:pointer;color:var(--ink-soft);font-family:"Instrument Sans",sans-serif;font-weight:700;font-size:13px;padding:var(--space-2);border-radius:var(--radius-md)}
  .tab.active{background:rgba(255,255,255,.10);color:var(--ink)}

  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:var(--paper-2);color:var(--ink);padding:var(--space-3) var(--space-4);border-radius:var(--radius-xl);font-size:12px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;z-index:60;box-shadow:0 10px 30px -12px rgba(0,0,0,.5);max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Indicador de sincronización con la nube (lo crea View.renderSync). Discreto, esquina superior. */
  .sync-indicator{position:fixed;top:var(--space-2);right:var(--space-2);z-index:70;font-size:11px;font-weight:700;padding:var(--space-1) var(--space-3);border-radius:var(--radius-xl);background:var(--paper-3);color:var(--ink-soft);border:1px solid var(--line);box-shadow:0 6px 18px -10px rgba(0,0,0,.6)}
  .sync-indicator.err{background:var(--alert-bg);color:var(--alert);border-color:var(--alert)}

  /* Pantalla de login (auth gate, magic link) */
  .login{max-width:360px;margin:0 auto;padding:var(--space-6) var(--space-4) 0;display:flex;flex-direction:column;gap:var(--space-5);text-align:center}
  .login-brand h1{font-family:"Instrument Sans",sans-serif;font-weight:800;font-size:40px;line-height:.95;letter-spacing:-.02em;color:var(--ink)}
  .login-brand h1 .accent{color:var(--accent)}
  .login-brand .tagline{margin-top:var(--space-1);font-weight:400;font-size:10px;letter-spacing:.3px;color:var(--ink-soft)}
  .login-form,.login-sent{display:flex;flex-direction:column;gap:var(--space-3)}
  .login-form .ti{text-align:center;font-size:16px}
  .login-emoji{font-size:40px}
  .login-sent p{font-size:14px;line-height:1.5}

  /* ============================================================
     PASO 2 — componentes del tab Primadas + overlays
     ============================================================ */
  .badge.good{background:rgba(77,217,160,.16);color:var(--green);border:1px solid rgba(77,217,160,.42)}
  .badge.red{background:rgba(240,140,140,.16);color:var(--alert);border:1px solid var(--alert)}
  .muted{color:var(--ink-soft)}
  .small{font-size:12px}
  .owe{color:var(--alert)}
  /* nota explicativa: texto auxiliar que acompaña al control de arriba (espaciado por token) */
  .hint{color:var(--ink-soft);font-size:12px;line-height:1.5;margin:var(--space-1) 0 var(--space-3)}
  /* utilitario de separación superior por token */
  .mt-3{margin-top:var(--space-3)}

  /* inputs base */
  .ti{font-family:inherit;font-size:14px;min-height:var(--tap-input);padding:var(--space-3);border:2px solid var(--line);border-radius:var(--radius-md);background:var(--paper);color:var(--ink);width:100%}
  .ti:focus{outline:none;border-color:var(--red)}
  .ti.name{font-family:"Instrument Sans",sans-serif;font-weight:700;font-size:18px}
  .ti:disabled{opacity:.6}
  .sel{font-family:inherit;font-size:13px;min-height:var(--tap-input);padding:var(--space-2) var(--space-3);border:2px solid var(--line);border-radius:var(--radius-md);background:var(--paper);color:var(--ink)}
  .sel:disabled{opacity:.6}
  .fld{display:flex;flex-direction:column;gap:var(--space-1);font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin:var(--space-3) 0}
  .row{display:flex;align-items:center}
  .row.gap{gap:var(--space-2)}.row.end{justify-content:flex-end;flex-wrap:wrap;margin-top:var(--space-3)}

  /* botones chicos */
  .mini{display:inline-flex;align-items:center;justify-content:center;min-height:var(--tap-sec);font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;border:2px solid var(--line);background:var(--paper);color:var(--ink);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);white-space:nowrap}
  .mini:active{transform:scale(.95)}
  .mini:disabled{opacity:.45;cursor:default}
  .mini.ghost{background:transparent}
  .mini.danger{color:var(--alert);border-color:var(--alert)}
  .mini.on{background:var(--green);color:var(--accent-ink);border-color:var(--green)}

  /* cards */
  .card{background:var(--paper-2);border:2px solid var(--line);border-radius:var(--radius-lg);padding:var(--space-4);margin-bottom:var(--space-4);box-shadow:var(--shadow)}
  .card.dark{background:var(--paper-2);color:var(--ink);border-color:var(--ink)}
  .card.dark .kv span{color:var(--ink-soft)}
  .card.dark .sub{color:var(--ink-soft);border-color:rgba(255,255,255,.14)}
  .card-head{display:flex;align-items:center;gap:var(--space-2)}
  .card-title{font-family:"Instrument Sans",sans-serif;font-weight:700;font-size:16px;margin-bottom:var(--space-2)}
  .state{font-size:12px;font-weight:700}
  .state.closed{color:var(--ink-soft)}
  .kv.total{border-top:2px solid var(--line);margin-top:var(--space-1);padding-top:var(--space-2);font-weight:700}
  .card.dark .kv.total{border-top-color:rgba(255,255,255,.22)}
  .kv.total b{color:var(--red-deep);font-size:15px}
  .card.dark .kv.total b{color:#ffd9a0}
  .sub{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin:var(--space-3) 0 var(--space-1);border-top:1px dashed var(--line);padding-top:var(--space-2)}
  .kv.subkv{border-top:none;padding:var(--space-1) 0;font-size:12px;color:var(--ink-soft)}
  .kv.subkv span{padding-left:var(--space-3)}
  .kv.subkv b{font-weight:400}
  .kv span i{font-style:normal;font-size:11px;color:var(--ink-soft)}

  /* asistencias */
  .addbar{display:flex;gap:var(--space-2);margin-bottom:var(--space-3);flex-wrap:wrap}
  .addbar .sel{flex:1;min-width:0}
  .asis-list{display:flex;flex-direction:column;gap:var(--space-3);margin-bottom:var(--space-4)}
  .asis{background:var(--paper-2);border:2px solid var(--line);border-radius:var(--radius-lg);overflow:hidden}
  .asis.is-principal{border-color:var(--red)}
  .asis.debe{border-color:var(--alert)}
  /* ---- Patrón ACORDEÓN (ver DESIGN.md › Patrones) ---- */
  .acc-head{display:flex;align-items:center;gap:var(--space-3);min-height:var(--tap-row);width:100%;background:transparent;border:none;cursor:pointer;color:var(--ink);font-family:inherit;text-align:left;padding:var(--space-3)}
  /* caret = chevron-down: cerrado apunta a la derecha (-90°), abierto hacia abajo (0°) */
  .acc-caret{display:inline-flex;align-items:center;color:var(--ink-soft);transition:transform .18s ease;flex:none;transform:rotate(-90deg)}
  .acc-caret .icon{width:18px;height:18px}
  .acc-caret.open{transform:rotate(0deg)}
  .acc-id{flex:1;min-width:0;font-size:15px;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
  .acc-amt{flex:none;font-weight:700;font-size:14px;display:flex;flex-direction:column;align-items:flex-end;line-height:1.15}
  .acc-amt i{font-style:normal;font-weight:400;font-size:11px}
  .acc-body{padding:0 var(--space-3) var(--space-3);animation:accIn .18s ease}
  @keyframes accIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .acc-h2{display:flex;align-items:center;gap:var(--space-2);min-height:var(--tap-row);background:transparent;border:none;cursor:pointer;color:var(--ink-soft);font-family:inherit;width:100%;text-align:left}
  .asis-head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);margin-bottom:var(--space-2)}
  .asis-id{font-size:15px;display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
  .asis-ctl{display:flex;align-items:center;gap:var(--space-2)}
  .cover{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-2)}
  .cover b{color:var(--ink)}
  .cover.org{font-style:italic}
  .prods{display:flex;flex-direction:column;gap:var(--space-1)}
  .prod{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);font-size:13px;padding:var(--space-1) 0}
  .prod.has{font-weight:700}
  .prod-name i{color:var(--ink-soft);font-style:normal;font-size:11px}
  .stepper{display:flex;align-items:center;gap:var(--space-2)}
  .step{display:flex;align-items:center;justify-content:center;width:var(--tap-sec);height:var(--tap-sec);border-radius:var(--radius-md);border:2px solid var(--line);background:var(--paper);color:var(--ink);font-size:17px;font-weight:700;cursor:pointer;line-height:1}
  .step:active{transform:scale(.9)}
  .step:disabled{opacity:.4;cursor:default}
  .qty{min-width:16px;text-align:center;font-size:14px}
  .asis-foot{display:flex;justify-content:space-between;gap:var(--space-3);margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px dashed var(--line);font-size:13px}
  .asis-foot b{font-weight:700}
  .consumo-vacio{padding:var(--space-1) 0}
  /* chip-picker "+ Agregar" */
  .addprod{margin-top:var(--space-2)}
  .prodpick{margin-top:var(--space-2);background:var(--paper);border:2px dashed var(--line);border-radius:var(--radius-md);padding:var(--space-2)}
  .prodpick-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-2)}
  .chips{display:flex;flex-wrap:wrap;gap:var(--space-2)}
  .chip{display:inline-flex;align-items:center;gap:var(--space-2);min-height:var(--tap-sec);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--line);background:var(--paper-2);color:var(--ink);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3)}
  .chip:active{transform:scale(.95)}
  .chip:hover{border-color:var(--accent)}
  .chip i{color:var(--ink-soft);font-style:normal;font-weight:400;font-size:11px}
  /* gestión de productos del evento */
  .prodmgmt{padding:var(--space-3)}
  .prodrow{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) 0;border-top:1px dashed var(--line)}
  .prodrow:first-child{border-top:none}
  .prodrow-name{flex:1;min-width:0;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prodrow-f{display:flex;flex-direction:column;gap:var(--space-1);font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft)}
  .ti.num{width:74px;padding:var(--space-2);font-size:13px}
  .ti.emoji{width:var(--tap-input);text-align:center;padding:var(--space-2)}
  .prodnew{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center;margin-top:var(--space-3);padding-top:var(--space-3);border-top:1px dashed var(--line)}
  .prodnew .ti:not(.num):not(#pn-emoji){flex:1;min-width:120px}
  .prodrow .xmini,.prodpick-head .xmini{display:flex;align-items:center;justify-content:center;border:2px solid var(--line);background:var(--paper);color:var(--alert);border-radius:var(--radius-sm);width:var(--tap-sec);height:var(--tap-sec);font-weight:700;flex:none}

  /* abonos / pagos (siguen activos con la cuenta cerrada) */
  .pay{margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px dashed var(--line)}
  .pay-form{display:flex;gap:var(--space-2)}
  .pay-form .ti{flex:1}
  .pay-sum{margin-top:var(--space-1)}
  .abonos{display:flex;flex-direction:column;gap:var(--space-1);margin-top:var(--space-2)}
  .abono{display:flex;align-items:center;gap:var(--space-2);font-size:12px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);padding:var(--space-2) var(--space-3)}
  .abono span{color:var(--ink-soft)}
  .abono b{margin-left:auto;font-weight:700}
  .abono .icon{color:var(--pos)}   /* check = pagado/positivo */
  .xmini{border:none;background:none;cursor:pointer;color:var(--ink-soft);font-size:13px;padding:var(--space-1);border-radius:var(--radius-sm)}
  .xmini:active{transform:scale(.85)}

  .empty.big{padding:var(--space-6) var(--space-4)}
  .ph-title{font-family:"Instrument Sans",sans-serif;font-weight:800;font-size:24px;color:var(--ink);margin-bottom:var(--space-1)}

  /* overlay (sheet detrás del engranaje) */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;justify-content:center;align-items:flex-end;padding:var(--space-3) var(--space-3) 0}
  .sheet{background:var(--paper);width:100%;max-width:var(--content-max);max-height:92vh;overflow:auto;border-radius:var(--radius-xl);border:2px solid var(--line);padding:var(--space-4) var(--space-4) calc(var(--space-5) + env(safe-area-inset-bottom));box-shadow:0 -16px 40px -18px rgba(0,0,0,.5)}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-5)}
  .sheet-title{font-family:"Instrument Sans",sans-serif;font-weight:800;font-size:22px}
  .sheet.full{min-height:86vh}
  .sheet-body{display:block}

  /* Cabecera compacta de la primada activa (tab Primadas = operar) + dashboard Resumen */
  .prm-head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-4)}
  .prm-head-main{min-width:0}
  .prm-name{font-family:"Instrument Sans",sans-serif;font-weight:800;font-size:22px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prm-meta{display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-1)}
  .resumen-head{margin-bottom:var(--space-4)}
  .resumen-head .prm-name{white-space:normal}
  /* "Zona peligrosa" en el sheet de config */
  .danger-sub{color:var(--alert);border-top-color:var(--alert)}

  /* Wizard "Nueva primada" (3 pasos) */
  .wz .wz-steps{display:flex;align-items:center;gap:0;flex:1}
  .wz-dot{display:flex;align-items:center;justify-content:center;width:var(--space-5);height:var(--space-5);border-radius:50%;border:2px solid var(--line);color:var(--ink-soft);font-size:14px;font-weight:700;flex:none;background:var(--paper)}
  .wz-dot.on{border-color:var(--accent);color:var(--accent)}
  .wz-dot.done{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .wz-line{flex:1;height:2px;background:var(--line);margin:0 var(--space-2)}
  .wz-title{font-family:"Instrument Sans",sans-serif;font-weight:800;font-size:20px;margin:var(--space-2) 0 var(--space-5)}
  .wz-step{display:block;animation:pop .22s ease}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .wz-chips{display:flex;flex-wrap:wrap;gap:var(--space-2)}
  .wz-chips .chip i{color:var(--ink-soft);font-style:normal;font-size:10px;text-transform:uppercase}
  .wz-chips .chip.on{border-color:var(--accent);color:var(--accent)}
  .wz .prodlist{display:flex;flex-direction:column;gap:var(--space-3)}
  .wz-prodrow{display:flex;flex-direction:column;gap:var(--space-2);padding:var(--space-3) 0;border-top:1px dashed var(--line)}
  .wz-prodrow:first-child{border-top:none;padding-top:0}
  .wz-prodrow-top{display:flex;gap:var(--space-2)}
  .wz-prodname{flex:1;min-width:0}
  .wz-prodrow-bot{display:flex;gap:var(--space-2);align-items:flex-end}
  .wz-prodrow-bot .prodrow-f{flex:1}
  .wz-prodrow-bot .ti.num{width:100%}
  .wz-nav{display:flex;gap:var(--space-2);margin-top:var(--space-4);padding-top:var(--space-3);border-top:1px dashed var(--line)}
  .wz-nav .mini,.wz-nav .btn{flex:1}

  /* seg-nav (segmented control) — Personas|Ajustes y estado ahorrador|invitado */
  .seg-nav{display:inline-flex;gap:0;background:var(--paper-2);border:2px solid var(--line);border-radius:var(--radius-md);padding:var(--space-1)}
  .seg{min-height:var(--tap-sec);font-family:"Instrument Sans",sans-serif;font-weight:700;font-size:14px;cursor:pointer;border:none;background:transparent;color:var(--ink-soft);padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm)}
  .seg.on{background:var(--paper-2);color:var(--ink)}
  .seg-nav.sm .seg{font-size:12px;padding:var(--space-2) var(--space-3)}

  /* directorio de personas */
  .people{display:flex;flex-direction:column;gap:var(--space-3)}
  .pcard{display:flex;flex-direction:column;gap:var(--space-2);background:var(--paper-2);border:2px solid var(--line);border-radius:var(--radius-lg);padding:var(--space-3)}
  .pcard-row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);flex-wrap:wrap}
  .pcard .breb{font-size:12px}

  [hidden]{display:none !important}
</style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <h1>Primad<span class="accent">app</span></h1>
        <div class="tagline">AHORRO · ENCUENTRO · BALANCE</div>
      </div>
      <div class="header-actions">
        <button class="gear" id="authBtn" title="Cuenta" aria-label="Cuenta">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="gear" id="gearBtn" title="Personas y ajustes" aria-label="Personas y ajustes">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        </button>
      </div>
    </header>

    <main id="screen"><!-- la Vista renderiza aquí --></main>
  </div>

  <!-- Navegación decidida (3 tabs). Inerte en PASO 1; se cablea en PASO 2. -->
  <nav class="tabbar" id="tabbar">
    <button class="tab" data-tab="resumen">Resumen</button>
    <button class="tab active" data-tab="primadas">Primadas</button>
    <button class="tab" data-tab="fondo">Fondo</button>
  </nav>

  <!-- Overlay (detrás del engranaje): Personas / Ajustes. Inerte salvo cuando ui.overlay activo. -->
  <div class="overlay" id="overlay" hidden></div>

  <div class="toast" id="toast"></div>

  <!-- SDK de Supabase por CDN (UMD → window.supabase), igual que las fuentes: sin npm en producción. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Orden de carga: config → util → api → auth → store → view → controller -->
  <script src="js/config.js"></script>
  <script src="js/util.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/view.js"></script>
  <script src="js/controller.js"></script>

  <!-- PWA: registrar el Service Worker (network-first; CACHE_VERSION se estampa en cada commit). -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
