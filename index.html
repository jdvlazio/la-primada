<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Primada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     Estilo BASE limpio y funcional (PASO 1). El diseño fino se
     define como paso aparte cuando el tab Primadas funcione.
     ============================================================ */
  :root{
    --paper:#f3e7cf; --paper-2:#efe0c2; --ink:#2b2118; --ink-soft:#7a6a55;
    --line:#d8c5a0; --red:#c8472f; --red-deep:#a3331e; --green:#3f7a52; --amber:#b9791f;
    --shadow:0 1px 0 rgba(0,0,0,.04), 0 12px 30px -18px rgba(43,33,24,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Space Mono",ui-monospace,monospace;color:var(--ink);background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(43,33,24,.05) 1px, transparent 0);
    background-size:14px 14px;line-height:1.4;-webkit-font-smoothing:antialiased;
    padding:0 0 calc(70px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:520px;margin:0 auto;padding:14px}

  /* ---------- Encabezado ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 2px 14px;border-bottom:2px dashed var(--line);margin-bottom:14px}
  .brand .kicker{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--red-deep);font-weight:700}
  .brand h1{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:34px;line-height:.95;letter-spacing:-.02em}
  .gear{background:var(--paper-2);border:2px solid var(--line);border-radius:12px;width:44px;height:44px;font-size:20px;cursor:pointer;color:var(--ink)}
  .gear:active{transform:scale(.94)}

  /* ---------- Bloques ---------- */
  .status{font-size:12px;color:var(--ink-soft);background:var(--paper-2);border:2px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:12px}
  .status b{color:var(--green)}
  .bar{display:flex;gap:8px;margin-bottom:14px}
  .btn{flex:1;font-family:"Bricolage Grotesque",sans-serif;font-weight:700;border:none;cursor:pointer;border-radius:12px;background:var(--red);color:#fff8ee;padding:13px;font-size:15px;transition:transform .08s ease, background .15s}
  .btn:active{transform:scale(.96)}
  .btn:hover{background:var(--red-deep)}
  .btn.ghost{background:var(--paper-2);color:var(--ink);border:2px solid var(--line)}
  .btn.ghost:hover{border-color:var(--red);background:var(--paper-2)}

  .panel{background:var(--ink);color:var(--paper);border-radius:14px;padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow)}
  .panel-title{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:20px;margin-bottom:8px}
  .kv{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:5px 0;font-size:13px;border-top:1px dashed rgba(255,255,255,.14)}
  .kv:first-of-type{border-top:none}
  .kv span{color:#c9b896}
  .kv b{font-weight:700}

  .h2{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:0 2px 8px}
  .plist{display:flex;flex-direction:column;gap:8px}
  .pitem{display:flex;align-items:center;gap:12px;text-align:left;cursor:pointer;width:100%;background:var(--paper-2);border:2px solid var(--line);border-radius:12px;padding:11px 13px;font-family:inherit;color:var(--ink)}
  .pitem.active{border-color:var(--red)}
  .pitem-main{flex:1;min-width:0}
  .pitem-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pitem-meta{font-size:11px;color:var(--ink-soft)}
  .pitem-num{text-align:right;font-size:12px;display:flex;flex-direction:column;gap:2px;white-space:nowrap}
  .pitem-num .muted{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
  .pitem-num b{color:var(--ink);font-weight:700}
  .pitem-num b.g{color:var(--red-deep)}

  .badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:1px 6px;border-radius:20px;vertical-align:middle}
  .badge.warn{background:rgba(185,121,31,.16);color:var(--amber);border:1px solid rgba(185,121,31,.4)}

  .empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:26px 16px;border:2px dashed var(--line);border-radius:14px}
  .note{margin-top:18px;font-size:11px;color:var(--ink-soft);text-align:center;line-height:1.5}

  /* ---------- Barra de tabs (placeholder de navegación, se cablea en PASO 2) ---------- */
  .tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:4px;background:var(--ink);padding:8px 8px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px -20px rgba(0,0,0,.6);z-index:40}
  .tab{flex:1;max-width:160px;background:transparent;border:none;cursor:pointer;color:#c9b896;font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:13px;padding:9px 6px;border-radius:10px}
  .tab.active{background:rgba(255,255,255,.10);color:var(--paper)}

  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:30px;font-size:12px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;z-index:60;box-shadow:0 10px 30px -12px rgba(0,0,0,.5);max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ============================================================
     PASO 2 — componentes del tab Primadas + overlays
     ============================================================ */
  .badge.good{background:rgba(63,122,82,.16);color:var(--green);border:1px solid rgba(63,122,82,.4)}
  .badge.red{background:rgba(200,71,47,.14);color:var(--red-deep);border:1px solid rgba(200,71,47,.4)}
  .muted{color:var(--ink-soft)}
  .small{font-size:12px}
  .owe{color:var(--red-deep)}

  /* inputs base */
  .ti{font-family:inherit;font-size:14px;padding:10px 11px;border:2px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);width:100%}
  .ti:focus{outline:none;border-color:var(--red)}
  .ti.name{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:18px}
  .ti:disabled{opacity:.6}
  .sel{font-family:inherit;font-size:13px;padding:9px 10px;border:2px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink)}
  .sel:disabled{opacity:.6}
  .fld{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
  .row{display:flex;align-items:center}
  .row.gap{gap:8px}.row.end{justify-content:flex-end;flex-wrap:wrap;margin-top:10px}

  /* botones chicos */
  .mini{font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;border:2px solid var(--line);background:var(--paper);color:var(--ink);border-radius:9px;padding:8px 11px;white-space:nowrap}
  .mini:active{transform:scale(.95)}
  .mini:disabled{opacity:.45;cursor:default}
  .mini.ghost{background:transparent}
  .mini.danger{color:var(--red-deep);border-color:rgba(200,71,47,.4)}
  .mini.on{background:var(--green);color:#fff8ee;border-color:var(--green)}

  /* cards */
  .card{background:var(--paper-2);border:2px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:16px;box-shadow:var(--shadow)}
  .card.dark{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .card.dark .kv span{color:#c9b896}
  .card.dark .sub{color:#c9b896;border-color:rgba(255,255,255,.14)}
  .card-head{display:flex;align-items:center;gap:8px}
  .card-title{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:16px;margin-bottom:8px}
  .state{font-size:12px;font-weight:700}
  .state.closed{color:var(--ink-soft)}
  .kv.total{border-top:2px solid var(--line);margin-top:3px;padding-top:7px;font-weight:700}
  .card.dark .kv.total{border-top-color:rgba(255,255,255,.22)}
  .kv.total b{color:var(--red-deep);font-size:15px}
  .card.dark .kv.total b{color:#ffd9a0}
  .sub{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin:12px 0 5px;border-top:1px dashed var(--line);padding-top:9px}
  .kv.subkv{border-top:none;padding:1px 0 1px 0;font-size:12px;color:var(--ink-soft)}
  .kv.subkv span{padding-left:12px}
  .kv.subkv b{font-weight:400}
  .kv span i{font-style:normal;font-size:11px;color:var(--ink-soft)}

  /* asistencias */
  .addbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .addbar .sel{flex:1;min-width:0}
  .asis-list{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
  .asis{background:var(--paper-2);border:2px solid var(--line);border-radius:13px;padding:12px}
  .asis.is-principal{border-color:var(--red)}
  .asis-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .asis-id{font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .asis-ctl{display:flex;align-items:center;gap:6px}
  .cover{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .cover b{color:var(--ink)}
  .cover.org{font-style:italic}
  .prods{display:flex;flex-direction:column;gap:5px}
  .prod{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;padding:3px 0}
  .prod.has{font-weight:700}
  .prod-name i{color:var(--ink-soft);font-style:normal;font-size:11px}
  .stepper{display:flex;align-items:center;gap:9px}
  .step{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);background:var(--paper);color:var(--ink);font-size:17px;font-weight:700;cursor:pointer;line-height:1}
  .step:active{transform:scale(.9)}
  .step:disabled{opacity:.4;cursor:default}
  .qty{min-width:16px;text-align:center;font-size:14px}
  .asis-foot{display:flex;justify-content:space-between;gap:10px;margin-top:9px;padding-top:8px;border-top:1px dashed var(--line);font-size:13px}
  .asis-foot b{font-weight:700}

  /* abonos / pagos (siguen activos con la cuenta cerrada) */
  .pay{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
  .pay-form{display:flex;gap:8px}
  .pay-form .ti{flex:1}
  .pay-sum{margin-top:6px}
  .abonos{display:flex;flex-direction:column;gap:5px;margin-top:7px}
  .abono{display:flex;align-items:center;gap:8px;font-size:12px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:5px 9px}
  .abono span{color:var(--ink-soft)}
  .abono b{margin-left:auto;font-weight:700}
  .xmini{border:none;background:none;cursor:pointer;color:var(--ink-soft);font-size:13px;padding:2px 4px;border-radius:6px}
  .xmini:active{transform:scale(.85)}

  .empty.big{padding:48px 20px}
  .ph-title{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:24px;color:var(--ink);margin-bottom:6px}

  /* overlay (sheet detrás del engranaje) */
  .overlay{position:fixed;inset:0;background:rgba(43,33,24,.45);z-index:50;display:flex;justify-content:center;align-items:flex-end;padding:0}
  .sheet{background:var(--paper);width:100%;max-width:520px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;border:2px solid var(--line);border-bottom:none;padding:14px 16px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -16px 40px -18px rgba(0,0,0,.5)}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .sheet-title{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:22px}
  .sheet.full{min-height:86vh}
  .sheet-body{display:block}

  /* seg-nav (segmented control) — Personas|Ajustes y estado ahorrador|invitado */
  .seg-nav{display:inline-flex;gap:0;background:var(--paper-2);border:2px solid var(--line);border-radius:11px;padding:2px}
  .seg{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:14px;cursor:pointer;border:none;background:transparent;color:var(--ink-soft);padding:7px 14px;border-radius:8px}
  .seg.on{background:var(--ink);color:var(--paper)}
  .seg-nav.sm .seg{font-size:12px;padding:6px 11px}

  /* directorio de personas */
  .people{display:flex;flex-direction:column;gap:10px}
  .pcard{display:flex;flex-direction:column;gap:8px;background:var(--paper-2);border:2px solid var(--line);border-radius:12px;padding:11px 12px}
  .pcard-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .pcard .breb{font-size:12px}

  [hidden]{display:none !important}
</style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="kicker">Natillera familiar</div>
        <h1>La Primada</h1>
      </div>
      <button class="gear" id="gearBtn" title="Personas y ajustes" aria-label="Personas y ajustes">⚙</button>
    </header>

    <main id="screen"><!-- la Vista renderiza aquí --></main>
  </div>

  <!-- Navegación decidida (3 tabs). Inerte en PASO 1; se cablea en PASO 2. -->
  <nav class="tabbar" id="tabbar">
    <button class="tab" data-tab="resumen">Resumen</button>
    <button class="tab active" data-tab="primadas">Primadas</button>
    <button class="tab" data-tab="fondo">Fondo</button>
  </nav>

  <!-- Overlay (detrás del engranaje): Personas / Ajustes. Inerte salvo cuando ui.overlay activo. -->
  <div class="overlay" id="overlay" hidden></div>

  <div class="toast" id="toast"></div>

  <!-- Orden de carga: config → util → store → view → controller -->
  <script src="js/config.js"></script>
  <script src="js/util.js"></script>
  <script src="js/store.js"></script>
  <script src="js/view.js"></script>
  <script src="js/controller.js"></script>
</body>
</html>
