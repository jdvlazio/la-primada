<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Primada · La Cuenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3e7cf; --paper-2:#efe0c2; --ink:#2b2118; --ink-soft:#7a6a55;
    --line:#d8c5a0; --red:#c8472f; --red-deep:#a3331e; --green:#3f7a52;
    --shadow:0 1px 0 rgba(0,0,0,.04), 0 12px 30px -18px rgba(43,33,24,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Space Mono",ui-monospace,monospace;color:var(--ink);background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(43,33,24,.05) 1px, transparent 0);
    background-size:14px 14px;padding:18px 14px 130px;line-height:1.4;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:520px;margin:0 auto}

  header{text-align:center;padding:22px 0 16px;border-bottom:2px dashed var(--line);margin-bottom:16px;position:relative}
  .kicker{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--red-deep);font-weight:700}
  h1{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:clamp(40px,13vw,62px);line-height:.92;letter-spacing:-.02em;color:var(--ink);margin:4px 0 6px}
  .tagline{font-size:12px;color:var(--ink-soft)}
  .price-strip{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--ink-soft)}
  .price-strip b{color:var(--ink)}

  /* ---------- Primada switcher ---------- */
  .primada-bar{display:flex;gap:8px;margin-bottom:14px}
  .primada-switch{
    flex:1;display:flex;align-items:center;gap:10px;text-align:left;cursor:pointer;
    background:var(--ink);color:var(--paper);border:none;border-radius:13px;padding:11px 15px;font-family:inherit;
  }
  .primada-switch .ps-fam{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:17px;line-height:1.05}
  .primada-switch .ps-date{font-size:11px;color:#c9b896;text-transform:uppercase;letter-spacing:.06em}
  .primada-switch .ps-stack{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;overflow:hidden}
  .primada-switch .ps-stack span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .primada-switch .ps-caret{font-size:14px;transition:transform .2s}
  .primada-switch.open .ps-caret{transform:rotate(180deg)}

  .primada-panel{
    background:var(--paper-2);border:2px solid var(--line);border-radius:14px;padding:8px;margin:-6px 0 16px;
    box-shadow:var(--shadow);animation:pop .2s ease;
  }
  .pp-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
  .pp-item{
    display:flex;align-items:center;gap:10px;background:var(--paper);border:2px solid var(--line);
    border-radius:11px;padding:10px 12px;cursor:pointer;
  }
  .pp-item.active{border-color:var(--red)}
  .pp-item .pp-info{flex:1;min-width:0}
  .pp-item .pp-fam{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pp-item .pp-meta{font-size:11px;color:var(--ink-soft)}
  .pp-item .pp-tot{font-weight:700;font-size:13px;color:var(--red-deep)}
  .pp-mini{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-family:inherit;font-size:15px;padding:2px 5px;border-radius:7px}
  .pp-mini:active{transform:scale(.9)}
  .pp-empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:10px 6px}
  .pp-new{border-top:1px dashed var(--line);padding-top:10px;display:flex;flex-direction:column;gap:8px}
  .pp-new .pn-row{display:flex;gap:8px}
  .pp-new input{flex:1;font-family:inherit;font-size:14px;padding:11px 12px;border:2px solid var(--line);border-radius:11px;background:var(--paper);color:var(--ink)}
  .pp-new input:focus{outline:none;border-color:var(--red)}

  .add-bar{display:flex;gap:8px;margin-bottom:18px}
  .add-bar input{flex:1;font-family:inherit;font-size:15px;padding:13px 14px;border:2px solid var(--line);border-radius:12px;background:var(--paper-2);color:var(--ink)}
  .add-bar input:focus{outline:none;border-color:var(--red)}
  .add-bar input::placeholder{color:var(--ink-soft)}
  .btn{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;border:none;cursor:pointer;border-radius:12px;background:var(--red);color:#fff8ee;padding:0 18px;font-size:15px;transition:transform .08s ease, background .15s}
  .btn:active{transform:scale(.95)}
  .btn:hover{background:var(--red-deep)}
  .btn.full{padding:13px;width:100%}

  .tools{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .tool{flex:1;min-width:0;font-family:inherit;font-size:12px;font-weight:700;padding:11px 8px;border:2px solid var(--line);border-radius:11px;background:var(--paper-2);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .08s ease, border-color .15s}
  .tool:active{transform:scale(.96)}
  .tool:hover{border-color:var(--red)}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;z-index:50;box-shadow:0 10px 30px -12px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .empty{text-align:center;color:var(--ink-soft);font-size:14px;padding:40px 20px;border:2px dashed var(--line);border-radius:16px}
  .empty .big{font-size:34px;display:block;margin-bottom:10px;filter:grayscale(.2)}

  .card{background:var(--paper-2);border:2px solid var(--line);border-radius:16px;padding:16px 16px 6px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;animation:pop .25s cubic-bezier(.2,.8,.3,1.2)}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .card-head{display:flex;align-items:center;justify-content:space-between;border-bottom:1px dashed var(--line);padding-bottom:10px;margin-bottom:8px}
  .name{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:20px;letter-spacing:-.01em}
  .del{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-family:inherit;font-size:18px;padding:4px 6px;line-height:1;border-radius:8px}
  .del:active{transform:scale(.9)}
  .del:hover{color:var(--red-deep)}
  .row{display:flex;align-items:center;gap:10px;padding:9px 0}
  .row .label{flex:1;min-width:0}
  .row .item-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
  .row .item-price{font-size:11px;color:var(--ink-soft)}
  .stepper{display:flex;align-items:center;gap:0;border:2px solid var(--line);border-radius:10px;overflow:hidden;background:var(--paper)}
  .stepper button{width:34px;height:34px;border:none;background:transparent;cursor:pointer;font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:18px;color:var(--ink)}
  .stepper button:active{background:var(--line)}
  .stepper .minus{color:var(--red-deep)}
  .stepper .plus{color:var(--green)}
  .stepper .count{min-width:30px;text-align:center;font-weight:700;font-size:15px;border-left:2px solid var(--line);border-right:2px solid var(--line);height:34px;line-height:34px}
  .row .sub{width:78px;text-align:right;font-size:13px;font-weight:700}
  .row.zero{opacity:.5}
  .card-total{display:flex;justify-content:space-between;align-items:baseline;border-top:1px dashed var(--line);margin-top:6px;padding:11px 2px 12px;font-weight:700}
  .card-total .t-amt{font-size:18px;color:var(--red-deep);font-family:"Bricolage Grotesque",sans-serif}

  .grand{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:var(--paper);padding:14px 16px calc(14px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px -20px rgba(0,0,0,.6)}
  .grand-inner{max-width:520px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .grand .meta{font-size:11px;letter-spacing:.06em;color:#c9b896;text-transform:uppercase}
  .grand .total{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:30px;line-height:1;letter-spacing:-.02em}
  .grand .reset{background:transparent;border:1.5px solid rgba(255,255,255,.25);color:var(--paper);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:12px;cursor:pointer}
  .grand .reset:active{transform:scale(.95)}
  [hidden]{display:none !important}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Encuentro de primos</div>
    <h1>La Primada</h1>
    <div class="tagline" id="tagline">La cuenta de la parranda 🍻</div>
    <div class="price-strip" id="priceStrip"></div>
  </header>

  <!-- Selector de primada -->
  <div class="primada-bar">
    <button class="primada-switch" id="primadaSwitch">
      <span class="ps-stack">
        <span class="ps-fam" id="psFam">Sin primada</span>
        <span class="ps-date" id="psDate">Crea la primera</span>
      </span>
      <span class="ps-caret">▾</span>
    </button>
  </div>
  <div class="primada-panel" id="primadaPanel" hidden>
    <div class="pp-list" id="ppList"></div>
    <div class="pp-new">
      <div class="pn-row">
        <input id="newFamilia" type="text" placeholder="Familia (ej. Villa)" maxlength="30" autocomplete="off">
        <input id="newFecha" type="month">
      </div>
      <button class="btn full" id="newPrimadaBtn">Crear primada</button>
    </div>
  </div>

  <!-- Cuenta de la primada activa -->
  <div id="account">
    <div class="add-bar">
      <input id="nameInput" type="text" placeholder="Nombre del primo…" autocomplete="off" maxlength="22">
      <button class="btn" id="addBtn">Agregar</button>
    </div>
    <div class="tools">
      <button class="tool" id="copyBtn">📋 Copiar</button>
      <button class="tool" id="backupBtn">⬇️ Respaldo</button>
      <button class="tool" id="restoreBtn">⬆️ Restaurar</button>
    </div>
    <input type="file" id="fileInput" accept=".json,application/json" style="display:none">
    <div id="list"></div>
  </div>
</div>

<div class="grand">
  <div class="grand-inner">
    <div>
      <div class="meta" id="grandMeta">0 primos</div>
      <div class="total" id="grandTotal">$0</div>
    </div>
    <button class="reset" id="resetBtn">Reiniciar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   LA PRIMADA — Arquitectura MVC (archivo único, sin build)
   ------------------------------------------------------------
   CONFIG      → constantes + valores por defecto (data-driven)
   Store       → MODELO: estado + persistencia versionada + acciones
   View        → VISTA: funciones puras estado → DOM
   Controller  → escucha eventos (delegación) → llama acciones
   Flujo único:  evento → acción → guarda → notifica → render
   ------------------------------------------------------------
   ESQUEMA v3 (dominio Primadas)
   AppState  { schemaVersion, settings{cover,defaultProducts}, primadas[], activePrimadaId }
   Primada   { id, familia, fecha, cover{ahorrador,invitado}, productos[], asistentes[], estado }
   Asistente { id, nombre, tipo('ahorrador'|'invitado'), coverExonerado, items{prodId:cant} }
   ============================================================ */

/* ---------- CONFIG ---------- */
const CONFIG = {
  storageKey: 'laPrimada',
  schemaVersion: 3,
  locale: 'es-CO',
  // Cover fijo para todas las primadas (se edita en ajustes; UI en Paso 5).
  // Placeholders en 0 hasta definir montos reales en el Paso 2.
  defaultCover: { ahorrador: 0, invitado: 0 },
  defaultProducts: [
    { id:'cerveza', name:'Costeñita',       emoji:'🍺', price:3500 },
    { id:'brownie', name:'Brownie',         emoji:'🍫', price:9000 },
    { id:'rollo',   name:'Rollo de canela', emoji:'🌀', price:9000 },
  ],
};

/* ---------- Utilidades ---------- */
const Util = {
  uid: (prefix='p') => prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
  peso: n => '$' + Number(n||0).toLocaleString(CONFIG.locale),
  esc: s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),
  currentMonth(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; },
  monthLabel(ym){
    if(!ym) return '';
    const [y,m] = String(ym).split('-').map(Number);
    if(!y||!m) return ym;
    const s = new Date(y, m-1, 1).toLocaleDateString(CONFIG.locale, { month:'long', year:'numeric' });
    return s.charAt(0).toUpperCase() + s.slice(1);
  },
};

/* ============================================================
   MODELO — Store  (único dueño del estado)
   ============================================================ */
const Store = (() => {
  let state = null;
  const listeners = [];

  function defaultState(){
    return {
      schemaVersion: CONFIG.schemaVersion,
      settings: { cover: { ...CONFIG.defaultCover }, defaultProducts: CONFIG.defaultProducts.map(p=>({...p})) },
      primadas: [],
      activePrimadaId: null,
    };
  }

  /* --- Normalizadores --- */
  function normProducts(arr){
    return (arr||[]).map(p => ({
      id: p.id || Util.uid('prod'),
      name: String(p.name||'Ítem').slice(0,40),
      emoji: p.emoji || '•',
      price: Number(p.price) || 0,
    }));
  }
  function normAsistente(productos){
    return (a) => {
      const items = {};
      productos.forEach(prod => { items[prod.id] = Math.max(0, parseInt((a.items||{})[prod.id]) || 0); });
      const tipo = (a.tipo === 'invitado') ? 'invitado' : 'ahorrador';
      return { id: a.id || Util.uid(), nombre: String(a.nombre||a.name||'Primo').slice(0,40), tipo, coverExonerado: !!a.coverExonerado, items };
    };
  }
  function normPrimada(p){
    const productos = normProducts(p.productos && p.productos.length ? p.productos : CONFIG.defaultProducts);
    const cover = {
      ahorrador: Number((p.cover||{}).ahorrador) || 0,
      invitado:  Number((p.cover||{}).invitado)  || 0,
    };
    return {
      id: p.id || Util.uid('prm'),
      familia: String(p.familia||'Primada').slice(0,30),
      fecha: p.fecha || Util.currentMonth(),
      cover, productos,
      asistentes: (p.asistentes||[]).map(normAsistente(productos)),
      estado: p.estado === 'cerrada' ? 'cerrada' : 'abierta',
    };
  }

  /* --- Migración: cualquier dato viejo → esquema actual --- */
  function migrate(raw){
    if (raw == null) return defaultState();

    // v3 ya tiene primadas[]
    if (typeof raw === 'object' && Array.isArray(raw.primadas)) {
      const s = defaultState();
      s.settings.cover = { ahorrador:Number((raw.settings?.cover||{}).ahorrador)||0, invitado:Number((raw.settings?.cover||{}).invitado)||0 };
      s.settings.defaultProducts = normProducts(raw.settings?.defaultProducts?.length ? raw.settings.defaultProducts : CONFIG.defaultProducts);
      s.primadas = raw.primadas.map(normPrimada);
      s.activePrimadaId = s.primadas.some(p=>p.id===raw.activePrimadaId) ? raw.activePrimadaId : (s.primadas[0]?.id || null);
      return s;
    }

    // v1 (arreglo pelado) o v2 ({products, people}) → envolver como primera primada
    let products = CONFIG.defaultProducts, people = [];
    if (Array.isArray(raw)) { people = raw; }
    else if (typeof raw === 'object') {
      if (Array.isArray(raw.products) && raw.products.length) products = raw.products;
      if (Array.isArray(raw.people)) people = raw.people;
    }
    const s = defaultState();
    s.settings.defaultProducts = normProducts(products);
    const primada = normPrimada({
      familia: 'Primada actual',
      fecha: Util.currentMonth(),
      cover: { ...CONFIG.defaultCover },
      productos: products,
      asistentes: people.map(pe => ({ nombre: pe.name||pe.nombre, items: pe.items })),
      estado: 'abierta',
    });
    s.primadas = [primada];
    s.activePrimadaId = primada.id;
    return s;
  }

  /* --- Persistencia --- */
  function load(){
    try { state = migrate(JSON.parse(localStorage.getItem(CONFIG.storageKey))); }
    catch(e){ state = defaultState(); }
  }
  function persist(){ try { localStorage.setItem(CONFIG.storageKey, JSON.stringify(state)); } catch(e){} }
  function commit(){ persist(); listeners.forEach(fn => fn(state)); }

  /* --- Selectores --- */
  const select = {
    state: () => state,
    activePrimada: () => state.primadas.find(p => p.id === state.activePrimadaId) || null,
    coverDe(primada, asistente){
      if (asistente.coverExonerado) return 0;
      return primada.cover[asistente.tipo] || 0;
    },
    asistenteConsumo(primada, asistente){
      return primada.productos.reduce((s,prod) => s + prod.price * (asistente.items[prod.id]||0), 0);
    },
    asistenteTotal(primada, asistente){
      return select.coverDe(primada, asistente) + select.asistenteConsumo(primada, asistente);
    },
    primadaTotal(primada){
      return (primada?.asistentes||[]).reduce((s,a) => s + select.asistenteTotal(primada, a), 0);
    },
  };

  /* --- Acciones (único punto que muta el estado) --- */
  const actions = {
    // primadas
    createPrimada({ familia, fecha }){
      const p = normPrimada({
        familia: familia || 'Primada',
        fecha: fecha || Util.currentMonth(),
        cover: { ...state.settings.cover },                 // snapshot del cover fijo
        productos: state.settings.defaultProducts.map(x=>({...x})), // snapshot de productos
        asistentes: [], estado: 'abierta',
      });
      state.primadas.unshift(p);
      state.activePrimadaId = p.id;
      commit();
    },
    selectPrimada(id){ if (state.primadas.some(p=>p.id===id)) { state.activePrimadaId = id; commit(); } },
    renamePrimada(id, { familia, fecha }){
      const p = state.primadas.find(x=>x.id===id); if(!p) return;
      if (familia != null) p.familia = String(familia).slice(0,30);
      if (fecha != null) p.fecha = fecha;
      commit();
    },
    deletePrimada(id){
      state.primadas = state.primadas.filter(p=>p.id!==id);
      if (state.activePrimadaId === id) state.activePrimadaId = state.primadas[0]?.id || null;
      commit();
    },
    // asistentes (sobre la primada activa)
    addAsistente(nombre){
      const p = select.activePrimada(); if(!p) return;
      const items = {}; p.productos.forEach(prod => items[prod.id]=0);
      p.asistentes.push({ id: Util.uid(), nombre: String(nombre).slice(0,40), tipo:'ahorrador', coverExonerado:false, items });
      commit();
    },
    removeAsistente(aid){
      const p = select.activePrimada(); if(!p) return;
      p.asistentes = p.asistentes.filter(a=>a.id!==aid); commit();
    },
    changeItem(aid, prodId, delta){
      const p = select.activePrimada(); if(!p) return;
      const a = p.asistentes.find(x=>x.id===aid); if(!a) return;
      a.items[prodId] = Math.max(0,(a.items[prodId]||0)+delta); commit();
    },
    // listos para el Paso 2 (tipo + exoneración)
    setAsistenteTipo(aid, tipo){
      const p = select.activePrimada(); if(!p) return;
      const a = p.asistentes.find(x=>x.id===aid); if(!a) return;
      a.tipo = (tipo==='invitado')?'invitado':'ahorrador'; commit();
    },
    toggleCoverExonerado(aid){
      const p = select.activePrimada(); if(!p) return;
      const a = p.asistentes.find(x=>x.id===aid); if(!a) return;
      a.coverExonerado = !a.coverExonerado; commit();
    },
    // utilidades globales
    resetActivePrimada(){
      const p = select.activePrimada(); if(!p) return;
      p.asistentes = []; commit();
    },
    replaceState(raw){ state = migrate(raw); commit(); },
  };

  function subscribe(fn){ listeners.push(fn); }
  return { load, subscribe, select, actions };
})();

/* ============================================================
   VISTA — View  (funciones puras estado → DOM)
   ============================================================ */
const View = (() => {
  const els = {};
  let panelOpen = false;

  function cache(){
    els.tagline=document.getElementById('tagline');
    els.priceStrip=document.getElementById('priceStrip');
    els.psFam=document.getElementById('psFam');
    els.psDate=document.getElementById('psDate');
    els.switch=document.getElementById('primadaSwitch');
    els.panel=document.getElementById('primadaPanel');
    els.ppList=document.getElementById('ppList');
    els.account=document.getElementById('account');
    els.list=document.getElementById('list');
    els.grandTotal=document.getElementById('grandTotal');
    els.grandMeta=document.getElementById('grandMeta');
    els.toast=document.getElementById('toast');
  }

  function setPanel(open){ panelOpen=open; els.panel.hidden=!open; els.switch.classList.toggle('open',open); }
  function togglePanel(){ setPanel(!panelOpen); }

  function priceStrip(productos){
    return productos.map(p => `<span>${p.emoji} ${Util.esc(p.name)} <b>${Util.peso(p.price)}</b></span>`).join('');
  }

  function primadaList(state){
    if(!state.primadas.length) return '<div class="pp-empty">Aún no hay primadas. Crea la primera abajo.</div>';
    return state.primadas.map(p => `
      <div class="pp-item ${p.id===state.activePrimadaId?'active':''}" data-act="select-primada" data-id="${p.id}">
        <div class="pp-info">
          <div class="pp-fam">${Util.esc(p.familia)}</div>
          <div class="pp-meta">${Util.esc(Util.monthLabel(p.fecha))} · ${p.asistentes.length} asist.</div>
        </div>
        <span class="pp-tot">${Util.peso(Store.select.primadaTotal(p))}</span>
        <button class="pp-mini" data-act="rename-primada" data-id="${p.id}" title="Renombrar">✎</button>
        <button class="pp-mini" data-act="delete-primada" data-id="${p.id}" title="Borrar">🗑</button>
      </div>`).join('');
  }

  const emptyAcct = '<div class="empty"><span class="big">🪑</span>Aún no hay primos en la mesa.<br>Agrega el primero para empezar.</div>';
  const noPrimada = '<div class="empty"><span class="big">📅</span>No hay primada seleccionada.<br>Crea una desde el selector de arriba.</div>';

  function row(a, prod){
    const c = a.items[prod.id]||0;
    return `
      <div class="row ${c===0?'zero':''}">
        <div class="label">
          <div class="item-name">${prod.emoji} ${Util.esc(prod.name)}</div>
          <div class="item-price">${Util.peso(prod.price)} c/u</div>
        </div>
        <div class="stepper">
          <button class="minus" data-act="dec" data-a="${a.id}" data-prod="${prod.id}">−</button>
          <span class="count">${c}</span>
          <button class="plus" data-act="inc" data-a="${a.id}" data-prod="${prod.id}">+</button>
        </div>
        <div class="sub">${c>0?Util.peso(prod.price*c):'—'}</div>
      </div>`;
  }
  function card(primada, a){
    return `
      <div class="card">
        <div class="card-head">
          <div class="name">${Util.esc(a.nombre)}</div>
          <button class="del" data-act="del" data-a="${a.id}">✕</button>
        </div>
        ${primada.productos.map(prod => row(a, prod)).join('')}
        <div class="card-total"><span>Total</span><span class="t-amt">${Util.peso(Store.select.asistenteTotal(primada,a))}</span></div>
      </div>`;
  }

  function render(state){
    const primada = Store.select.activePrimada();

    // selector
    els.psFam.textContent = primada ? primada.familia : 'Sin primada';
    els.psDate.textContent = primada ? Util.monthLabel(primada.fecha) : 'Crea la primera';
    els.ppList.innerHTML = primadaList(state);

    // sin primada → ocultar cuenta
    if(!primada){
      els.account.hidden = true;
      els.tagline.textContent = 'La cuenta de la parranda 🍻';
      els.priceStrip.innerHTML = '';
      els.list.innerHTML = '';
      els.grandTotal.textContent = Util.peso(0);
      els.grandMeta.textContent = '0 primos';
      if(!state.primadas.length) setPanel(true);
      return;
    }

    els.account.hidden = false;
    els.tagline.textContent = `${primada.familia} · ${Util.monthLabel(primada.fecha)}`;
    els.priceStrip.innerHTML = priceStrip(primada.productos);
    els.list.innerHTML = primada.asistentes.length
      ? primada.asistentes.map(a => card(primada, a)).join('')
      : emptyAcct;
    els.grandTotal.textContent = Util.peso(Store.select.primadaTotal(primada));
    const n = primada.asistentes.length;
    els.grandMeta.textContent = n + (n===1?' primo':' primos');
  }

  let toastTimer;
  function toast(msg){
    els.toast.textContent=msg; els.toast.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>els.toast.classList.remove('show'),2200);
  }

  return { cache, render, toast, togglePanel, setPanel };
})();

/* ============================================================
   CONTROLADOR — Controller  (eventos → acciones)
   ============================================================ */
const Controller = (() => {

  function buildText(){
    const p = Store.select.activePrimada();
    if(!p) return 'La Primada — sin primada seleccionada.';
    if(!p.asistentes.length) return `🍻 LA PRIMADA — ${p.familia} (${Util.monthLabel(p.fecha)})\n\nLa cuenta está vacía.`;
    let t = `🍻 LA PRIMADA — ${p.familia} · ${Util.monthLabel(p.fecha)}\n\n`;
    p.asistentes.forEach(a => {
      const lines = p.productos.filter(prod=>(a.items[prod.id]||0)>0)
        .map(prod=>`  ${prod.emoji} ${a.items[prod.id]} ${prod.name} = ${Util.peso(prod.price*a.items[prod.id])}`);
      t += `*${a.nombre}* — ${Util.peso(Store.select.asistenteTotal(p,a))}\n`;
      t += (lines.length?lines.join('\n'):'  (nada todavía)') + '\n\n';
    });
    t += `━━━━━━━━━━━━━━\n*TOTAL: ${Util.peso(Store.select.primadaTotal(p))}*`;
    return t;
  }

  function onPanelClick(e){
    const b = e.target.closest('[data-act]'); if(!b) return;
    const { act, id } = b.dataset;
    if(act==='select-primada'){ Store.actions.selectPrimada(id); View.setPanel(false); }
    else if(act==='rename-primada'){
      const p = Store.select.state().primadas.find(x=>x.id===id); if(!p) return;
      const familia = prompt('Nombre de la familia:', p.familia);
      if(familia!==null) Store.actions.renamePrimada(id,{familia: familia.trim()||p.familia});
    }
    else if(act==='delete-primada'){
      const p = Store.select.state().primadas.find(x=>x.id===id); if(!p) return;
      if(confirm(`¿Borrar la primada "${p.familia}"? Esto elimina sus asistentes y consumos.`)) Store.actions.deletePrimada(id);
    }
  }

  function onListClick(e){
    const b = e.target.closest('[data-act]'); if(!b) return;
    const { act, a, prod } = b.dataset;
    if(act==='inc') Store.actions.changeItem(a, prod, +1);
    else if(act==='dec') Store.actions.changeItem(a, prod, -1);
    else if(act==='del'){
      const primada = Store.select.activePrimada();
      const as = primada?.asistentes.find(x=>x.id===a);
      if(as && (Store.select.asistenteTotal(primada,as)===0 || confirm('¿Eliminar a '+as.nombre+'?'))) Store.actions.removeAsistente(a);
    }
  }

  async function copy(){
    const text = buildText();
    try { await navigator.clipboard.writeText(text); View.toast('Cuenta copiada ✓'); }
    catch(e){
      const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand('copy'); View.toast('Cuenta copiada ✓'); }catch(_){ prompt('Copia el texto:', text); }
      document.body.removeChild(ta);
    }
  }
  function backup(){
    const payload = { ...Store.select.state(), app:'laPrimada', exportedAt:new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const d=new Date(); const stamp=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const link=document.createElement('a'); link.href=url; link.download=`la-primada-${stamp}.json`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
    View.toast('Respaldo descargado ✓');
  }
  function restore(file){
    const reader=new FileReader();
    reader.onload=()=>{ try{
      const obj=JSON.parse(reader.result);
      if(Store.select.state().primadas.length && !confirm('¿Reemplazar TODAS las primadas con el respaldo?')) return;
      Store.actions.replaceState(obj); View.toast('Datos restaurados ✓');
    }catch(err){ View.toast('Archivo no válido ✗'); } };
    reader.readAsText(file);
  }

  function init(){
    document.getElementById('primadaSwitch').addEventListener('click', View.togglePanel);
    document.getElementById('primadaPanel').addEventListener('click', onPanelClick);

    const newFecha = document.getElementById('newFecha');
    newFecha.value = Util.currentMonth();
    document.getElementById('newPrimadaBtn').addEventListener('click', () => {
      const familia = document.getElementById('newFamilia').value.trim();
      if(!familia){ View.toast('Escribe el nombre de la familia'); return; }
      Store.actions.createPrimada({ familia, fecha: newFecha.value || Util.currentMonth() });
      document.getElementById('newFamilia').value='';
      View.setPanel(false);
    });

    document.getElementById('list').addEventListener('click', onListClick);

    const nameInput=document.getElementById('nameInput');
    const submitName=()=>{ const v=nameInput.value.trim(); if(v){ Store.actions.addAsistente(v); nameInput.value=''; nameInput.focus(); } };
    document.getElementById('addBtn').addEventListener('click', submitName);
    nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') submitName(); });

    document.getElementById('copyBtn').addEventListener('click', copy);
    document.getElementById('backupBtn').addEventListener('click', backup);
    const fileInput=document.getElementById('fileInput');
    document.getElementById('restoreBtn').addEventListener('click', ()=>fileInput.click());
    fileInput.addEventListener('change', e=>{ const f=e.target.files[0]; if(f) restore(f); fileInput.value=''; });

    document.getElementById('resetBtn').addEventListener('click', ()=>{
      const p=Store.select.activePrimada();
      if(p && p.asistentes.length && confirm(`¿Borrar todos los asistentes de "${p.familia}"?`)) Store.actions.resetActivePrimada();
    });
  }
  return { init };
})();

/* ============================================================
   BOOTSTRAP
   ============================================================ */
(function init(){
  View.cache();
  Store.subscribe(View.render);
  Controller.init();
  Store.load();
  View.render(Store.select.state());
})();
</script>
</body>
</html>
